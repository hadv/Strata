apiVersion: v1
kind: ConfigMap
metadata:
  name: query-config
  namespace: strata
data:
  MYSQL_HOST: mysql
  MYSQL_PORT: "3306"
  MYSQL_DB: strata_read
  MYSQL_USER: strata
  MYSQL_PASSWORD: strata_secret
  KAFKA_BOOTSTRAP_SERVERS: kafka-0.kafka.strata.svc.cluster.local:9092
  KAFKA_TOPIC: postgres.public.events
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: query-service
  namespace: strata
  labels:
    app: query-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: query-service
  template:
    metadata:
      labels:
        app: query-service
    spec:
      containers:
        - name: query
          image: strata-query:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: query-config
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: query-service
  namespace: strata
  labels:
    app: query-service
spec:
  type: ClusterIP
  ports:
    - port: 8081
      targetPort: 8081
  selector:
    app: query-service
