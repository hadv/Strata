apiVersion: apps/v1
kind: Deployment
metadata:
  name: fee-service-vn
  namespace: strata
  labels:
    app: fee-service-vn
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fee-service-vn
  template:
    metadata:
      labels:
        app: fee-service-vn
    spec:
      containers:
        - name: fee-service
          image: strata-fee-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8090
          env:
            - name: COUNTRY
              value: VN
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: fee-service-vn
  namespace: strata
spec:
  selector:
    app: fee-service-vn
  ports:
    - port: 8090
      targetPort: 8090
