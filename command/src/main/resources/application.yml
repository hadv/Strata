server:
  port: 8080

spring:
  application:
    name: strata-command
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:strata_events}
    username: ${POSTGRES_USER:strata}
    password: ${POSTGRES_PASSWORD:strata_secret}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

logging:
  level:
    com.example.strata: DEBUG
    org.springframework.web: INFO
