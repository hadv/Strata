services:
  # ============================================================
  # WRITE SIDE: PostgreSQL (Event Store)
  # ============================================================
  postgres-write:
    image: postgres:16-alpine
    container_name: strata-postgres
    environment:
      POSTGRES_DB: strata_events
      POSTGRES_USER: strata
      POSTGRES_PASSWORD: strata_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    command: >
      postgres
        -c wal_level=logical
        -c max_wal_senders=4
        -c max_replication_slots=4
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U strata -d strata_events"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - strata-net

  # ============================================================
  # READ SIDE: MySQL (Read Model / Projections)
  # ============================================================
  mysql-read:
    image: mysql:8.0
    container_name: strata-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_secret
      MYSQL_DATABASE: strata_read
      MYSQL_USER: strata
      MYSQL_PASSWORD: strata_secret
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "strata", "-pstrata_secret"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - strata-net

  # ============================================================
  # MESSAGE BROKER: Kafka (KRaft mode — no Zookeeper needed)
  # ============================================================
  kafka:
    image: bitnami/kafka:3.7
    container_name: strata-kafka
    environment:
      # KRaft mode configuration
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # Listeners
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # Cluster
      KAFKA_KRAFT_CLUSTER_ID: strata-kraft-cluster-001
      ALLOW_PLAINTEXT_LISTENER: "yes"
      # Topic defaults
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_NUM_PARTITIONS: 3
      KAFKA_CFG_DEFAULT_REPLICATION_FACTOR: 1
    ports:
      - "9094:9094"
    volumes:
      - kafka-data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s
    networks:
      - strata-net

  # ============================================================
  # CDC: Debezium (Kafka Connect with PostgreSQL connector)
  # ============================================================
  connect:
    image: debezium/connect:2.5
    container_name: strata-connect
    environment:
      GROUP_ID: strata-connect-cluster
      CONFIG_STORAGE_TOPIC: _connect-configs
      OFFSET_STORAGE_TOPIC: _connect-offsets
      STATUS_STORAGE_TOPIC: _connect-status
      BOOTSTRAP_SERVERS: kafka:9092
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
    ports:
      - "8083:8083"
    depends_on:
      kafka:
        condition: service_healthy
      postgres-write:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8083/ || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s
    networks:
      - strata-net

  # ============================================================
  # APPLICATION: Command Service (Write Side)
  # ============================================================
  command-service:
    build:
      context: ..
      dockerfile: docker/command.Dockerfile
    container_name: strata-command
    environment:
      POSTGRES_HOST: postgres-write
      POSTGRES_PORT: 5432
      POSTGRES_DB: strata_events
      POSTGRES_USER: strata
      POSTGRES_PASSWORD: strata_secret
    ports:
      - "8080:8080"
    depends_on:
      postgres-write:
        condition: service_healthy
    networks:
      - strata-net

  # ============================================================
  # APPLICATION: Query Service (Read Side)
  # ============================================================
  query-service:
    build:
      context: ..
      dockerfile: docker/query.Dockerfile
    container_name: strata-query
    environment:
      MYSQL_HOST: mysql-read
      MYSQL_PORT: 3306
      MYSQL_DB: strata_read
      MYSQL_USER: strata
      MYSQL_PASSWORD: strata_secret
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: postgres.public.events
    ports:
      - "8081:8081"
    depends_on:
      mysql-read:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - strata-net

  # ============================================================
  # UTILITY: Kafka UI (optional — for monitoring topics)
  # ============================================================
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: strata-kafka-ui
    environment:
      KAFKA_CLUSTERS_0_NAME: strata
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: debezium
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: http://connect:8083
    ports:
      - "9090:8080"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - strata-net

volumes:
  postgres-data:
  mysql-data:
  kafka-data:

networks:
  strata-net:
    driver: bridge
